spring:
  application:
    name: calmDesk

  profiles:
    active: local

  jackson:
    time-zone: Asia/Seoul

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

server:
  port: 8080

app:
  business-card:
    ai:
      provider: openai
  call-record:
    stt:
      provider: google-cloud
    google-cloud:
      location: global
    profanity:
      provider: local

logging:
  level:
    org.springframework.ai: DEBUG
