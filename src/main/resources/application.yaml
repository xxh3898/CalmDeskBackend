spring:
  application:
    name: calmDesk

  ai:
    model:
      chat: openai   # 운영: OpenAI gpt-4o-mini | 테스트: dev 프로필로 Ollama 사용
    openai:

      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.7

  config:
    import: optional:classpath:application-secret.yaml

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false  # <--- 이 줄을 여기에 추가하세요!
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

server:
  port: 8080

logging:
  level:
    org.springframework.ai: DEBUG
