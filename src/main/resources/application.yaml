spring:
  application:
    name: calmDesk

  datasource:
    url: jdbc:mysql://localhost:3306/calmDesk_db?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: user
    password: 1234

  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  sql:
    init:
      mode: never

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

server:
  port: 8080

jwt:
  secret: MhzEosqAWRLXh5IhlFdNYCHlOFYq1YTaappTnLvknac=
  expiration: 86400000