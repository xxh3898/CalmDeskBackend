spring:
  application:
    name: calmDesk

  ai:
    model:
      chat: google-genai   # 운영: Gemini API | 테스트: dev 프로필로 Ollama 사용
    google:
      genai:
        chat:
          options:
            model: gemma-3-12b-it
            temperature: 0.7

  config:
    import: optional:classpath:application-secret.yaml

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 100MB

server:
  port: 8080
