name: Backend CD

on:
  push:
    branches: [ "main" ] # main 브랜치에 푸시/머지될 때 작동

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*-SNAPSHOT.jar"
          target: "/home/ubuntu/"
          strip_components: 2

      - name: Run Deploy Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 기존 프로세스 종료 후 재실행
            fuser -k 8080/tcp || true
            mv /home/ubuntu/*-SNAPSHOT.jar /home/ubuntu/calmdesk-0.0.1-SNAPSHOT.jar
            nohup java -jar /home/ubuntu/calmdesk-0.0.1-SNAPSHOT.jar > /home/ubuntu/log.txt 2>&1 &