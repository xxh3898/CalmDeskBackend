name: Backend CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/*-SNAPSHOT.jar"
          target: "/home/ubuntu/"
          strip_components: 2

      - name: Run Deploy Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 1. 기존 서버 종료 (8080 포트 비우기)
            sudo fuser -k 8080/tcp || true
            
            # 2. 전송된 JAR 파일 이름 깔끔하게 정리
            mv /home/ubuntu/*-SNAPSHOT.jar /home/ubuntu/calmdesk-0.0.1-SNAPSHOT.jar
            
            # 3. 메모리 제한 옵션, 시간대 설정, 외부 시크릿 설정 파일을 포함하여 실행
            nohup java -Duser.timezone=Asia/Seoul -Xmx512M -jar /home/ubuntu/calmdesk-0.0.1-SNAPSHOT.jar \
            --spring.profiles.active=prod \
            --spring.config.additional-location=file:/home/ubuntu/application-prod.yaml \
            > /home/ubuntu/log.txt 2>&1 &