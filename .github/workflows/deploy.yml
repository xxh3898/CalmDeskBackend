name: Backend CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          source: "build/libs/calmdesk-0.0.1-SNAPSHOT.jar"
          target: "/home/ubuntu/"
          strip_components: 2

      - name: Run Deploy Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # 1. 기존 서버 종료 (8080 포트 비우기)
            sudo fuser -k 8080/tcp || true
            
            # 2. 메모리 제한, 시간대, 프로필, AI 충돌 방지 옵션을 포함하여 백그라운드 실행
            # (Github Actions 무한 대기 방지를 위해 < /dev/null 추가)
            nohup java -Duser.timezone=Asia/Seoul -Xmx512M -jar /home/ubuntu/calmdesk-0.0.1-SNAPSHOT.jar \
            --spring.profiles.active=prod \
            --spring.autoconfigure.exclude=org.springframework.ai.model.google.genai.autoconfigure.chat.GoogleGenAiChatAutoConfiguration,org.springframework.ai.model.ollama.autoconfigure.OllamaChatAutoConfiguration \
            > /home/ubuntu/log.txt 2>&1 < /dev/null &